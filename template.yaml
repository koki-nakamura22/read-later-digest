AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: read-later-digest — daily Notion → Claude → SES batch (F7)

Parameters:
  NotionDbId:
    Type: String
    Description: Notion database ID containing the saved articles.
  NotionToken:
    Type: String
    NoEcho: true
    Description: Notion integration token used to authenticate the Notion API.
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key used to call Claude for summarization.
  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Default: ''
    Description: Slack incoming webhook URL (required only when NOTIFY_CHANNELS contains 'slack').
  NotionStatusUnread:
    Type: String
    Default: '未読'
  NotionStatusProcessed:
    Type: String
    Default: '処理済み'
  MailFrom:
    Type: String
    Description: SES-verified sender address.
  MailTo:
    Type: String
    Description: Comma-separated recipient list.
  ScheduleExpression:
    Type: String
    # 22:00 UTC daily = 07:00 JST daily
    Default: 'cron(0 22 * * ? *)'
    Description: EventBridge schedule expression (UTC).
  LambdaTimeoutSeconds:
    Type: Number
    Default: 600
    MinValue: 60
    MaxValue: 900
  LambdaMemorySizeMb:
    Type: Number
    Default: 512
    MinValue: 128
    MaxValue: 3008
  LogRetentionDays:
    Type: Number
    Default: 30
  NotifyChannels:
    Type: String
    Default: 'mail'
    Description: Comma-separated notification channels (mail / slack).
  NotionStatusProperty:
    Type: String
    Default: 'Status'
  NotionTypeProperty:
    Type: String
    Default: 'Type'
  NotionPriorityProperty:
    Type: String
    Default: 'Priority'
  LlmModel:
    Type: String
    Default: 'claude-sonnet-4-6'
  LlmConcurrency:
    Type: Number
    Default: 5
  LlmBodyMaxChars:
    Type: Number
    Default: 30000
  LlmMaxRateLimitRetries:
    Type: Number
    Default: 3
  LlmInitialBackoffSec:
    Type: String
    Default: '1.0'
    Description: Initial backoff seconds for LLM rate-limit retries (float as string).
  FetchTimeoutSec:
    Type: String
    Default: '15.0'
    Description: HTTP fetch timeout in seconds (float as string).
  SlackTimeoutSec:
    Type: String
    Default: '10.0'
    Description: Slack webhook timeout in seconds (float as string).

Globals:
  Function:
    Runtime: python3.13
    Architectures: [arm64]
    Tracing: Active

Resources:
  ReadLaterDigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: read-later-digest
      CodeUri: ./src
      Handler: read_later_digest.handler.lambda_handler
      Timeout: !Ref LambdaTimeoutSeconds
      MemorySize: !Ref LambdaMemorySizeMb
      Environment:
        Variables:
          NOTION_DB_ID: !Ref NotionDbId
          NOTION_TOKEN: !Ref NotionToken
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          NOTION_STATUS_UNREAD: !Ref NotionStatusUnread
          NOTION_STATUS_PROCESSED: !Ref NotionStatusProcessed
          MAIL_FROM: !Ref MailFrom
          MAIL_TO: !Ref MailTo
          NOTIFY_CHANNELS: !Ref NotifyChannels
          NOTION_STATUS_PROPERTY: !Ref NotionStatusProperty
          NOTION_TYPE_PROPERTY: !Ref NotionTypeProperty
          NOTION_PRIORITY_PROPERTY: !Ref NotionPriorityProperty
          LLM_MODEL: !Ref LlmModel
          LLM_CONCURRENCY: !Ref LlmConcurrency
          LLM_BODY_MAX_CHARS: !Ref LlmBodyMaxChars
          LLM_MAX_RATE_LIMIT_RETRIES: !Ref LlmMaxRateLimitRetries
          LLM_INITIAL_BACKOFF_SEC: !Ref LlmInitialBackoffSec
          FETCH_TIMEOUT_SEC: !Ref FetchTimeoutSec
          SLACK_TIMEOUT_SEC: !Ref SlackTimeoutSec
          POWERTOOLS_SERVICE_NAME: read-later-digest
          POWERTOOLS_LOG_LEVEL: INFO
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Name: read-later-digest-daily
            Description: Daily trigger for read-later-digest batch.
            Enabled: true
      Policies:
        - Statement:
            - Sid: SesSend
              Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'

  ReadLaterDigestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ReadLaterDigestFunction}'
      RetentionInDays: !Ref LogRetentionDays

Outputs:
  FunctionName:
    Description: Lambda function name.
    Value: !Ref ReadLaterDigestFunction
  FunctionArn:
    Description: Lambda function ARN.
    Value: !GetAtt ReadLaterDigestFunction.Arn
